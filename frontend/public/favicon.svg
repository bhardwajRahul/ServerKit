<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Tile fill is recolored per-install by install.sh (randomize_favicon) so a
       favicon-hash comparison across installs differs by color while the mark
       stays the same. If the tint step never runs, this default color ships. -->
  <rect width="32" height="32" rx="7" fill="#5a67e8"/>
  <g transform="translate(6 6) scale(0.8333)" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
    <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
    <line x1="6" y1="6" x2="6.01" y2="6"/>
    <line x1="6" y1="18" x2="6.01" y2="18" stroke="#3ddc97"/>
  </g>
</svg>
